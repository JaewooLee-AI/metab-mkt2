            - paragraph [ref=f3e227]: 스마트폰을 아예 못 쓰게 뺏는 게 아니라, 오히려 스마트폰을 '역사 탐험 나침반'이자 '조선시대 비밀 설계사의 밀서'로 써서 삼청동이랑 북촌 한옥마을 일대를 뛰어다니며 미션을 깨는 프로그램이에요! '삼청동 시공간의 틈'이라는 야외 역사 탐험 미션인데, 진짜 내돈내산 대만족이었어요.
            - paragraph [ref=f3e228]: 골목골목 돌아다니면서 역사 추리 게임을 하는 건데요. 삼청동이 그냥 예쁜 동네인 줄만 알았는데, '산이 맑고, 물이 맑고, 사람 인심이 맑다' 해서 삼청(三淸)이라 불렸더라고요. 우리 아이가 미션 해결하려고 한옥 기와 문양도 유심히 관찰하고, 온돌이랑 대청마루에 담긴 과학 원리도 미션 풀면서 스스로 깨닫는데.. 옆에서 보는데 진짜 소름 돋았잖아요ㅋㅋ 주입식 교육이 아니라 본인이 직접 조선시대 탐험가가 돼서 몸으로 체득하니까 머리에 쏙쏙 들어오나 봐요. 개화기 시절 역사 인물들 이야기도 자연스럽게 녹아있어서 역사 공부가 저절로 돼요!
            - paragraph [ref=f3e229]: 특히 신기했던 게, 폰 들고 북촌 고지대에 올라가서 특정 기와지붕 라인에 카메라 화면을 맞추니까 AR(증강현실)로 조선시대 풍경이 짠! 오버레이되는 미션이 있었거든요? 아이가 진짜 시간 여행자가 된 것처럼 눈이 반짝반짝해지더라고요ㅎㅎ 대문에 그려진 전통 문양을 손가락으로 터치해서 그리며 부적을 완성하기도 하고, 돌담길 벽돌 개수 세면서 수학적인 퀴즈도 풀고.. 심지어 폰 자이로 센서를 이용해서 가상 물걸레로 전통 마루를 싹싹 닦는 미션까지 있어서 아이가 지루할 틈이 없었어요. 스마트폰이 유해한 기계가 아니라, 역사 속으로 들어가는 멋진 도구가 된 느낌이었달까요?
            - paragraph [ref=f3e230]: 걷는 거리는 한 2.2km 정도 되는데, 북촌 언덕길이랑 돌계단이 살짝 경사가 있어서 아이들 편한 운동화는 필수예요! 근데 중간중간에 삼청동 특유의 고즈넉한 찻집이나 예쁜 이색 카페들이 많아서 미션 하다가 힘들면
